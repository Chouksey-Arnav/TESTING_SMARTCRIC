<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#10b981" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SmartCrick" />
  <meta name="description" content="SmartCrick — AI-powered cricket training. 150 drills, 242 mental sessions, challenges, fitness builder." />
  <title>SmartCrick — Train Like a Pro</title>
  <!-- CSS first, always -->
  <link rel="stylesheet" href="/styles.css" />
  <!--
    async = downloads in parallel, executes the moment it arrives,
    never blocks app.js. app.js already guards with typeof confetti !== "undefined".
  -->
  <script async src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <div id="root"></div>
  <!--
    app.js is at the END of body, so document.getElementById("root")
    is guaranteed to exist. No defer needed — DOM is already parsed.
    This is the original, correct pattern for script-at-bottom loading.
  -->
  <script src="/app.js"></script>
</body>
</html>
