<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#10b981"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="description" content="SmartCrick AI — Cricket training platform with drills, mental training, AI coaching, workouts and more."/>
  <title>SmartCrick AI</title>
  <link rel="stylesheet" href="styles.css"/>
  <!-- Tailwind CDN with dark mode class strategy -->
  <script>window.tailwind={darkMode:'class'}</script>

  <!-- React 18 UMD (externalized from bundle) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- canvas-confetti for XP celebrations -->

</head>
<body class="antialiased">
  <div id="root"></div>
  <!-- app.js: fully self-contained bundle (all data, icons, pages, db, router) -->
  <script src="app.js"></script>

</html>
