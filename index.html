  <style>
    /* Critical boot styles — prevent flash of unstyled content while app.js loads */
    html, body {
      background: #0b0f1a;
      color: #e5e7eb;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #boot-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: radial-gradient(ellipse at top, #0f1a2e 0%, #0b0f1a 60%);
      z-index: 9999;
      transition: opacity .4s ease;
    }
    #boot-loader.done { opacity: 0; pointer-events: none; }
    .boot-logo {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 0 40px rgba(16, 185, 129, .4), 0 0 0 1px rgba(16, 185, 129, .2);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 900; font-size: 28px;
      animation: bootPulse 1.8s ease-in-out infinite;
    }
    @keyframes bootPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(16, 185, 129, .4), 0 0 0 1px rgba(16, 185, 129, .2); }
      50% { transform: scale(1.04); box-shadow: 0 0 60px rgba(16, 185, 129, .6), 0 0 0 1px rgba(16, 185, 129, .4); }
    }
    .boot-text {
      color: #6b7280; font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- Boot loader (hidden by app.js once React mounts) -->
  <div id="boot-loader">
    <div class="boot-logo">SC</div>
    <div class="boot-text">SmartCrick AI</div>
  </div>

  <!-- React mount point -->
  <div id="root"></div>

  <!-- Main app -->
  <script src="/app.js" defer></script>
</body>
</html>
