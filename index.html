<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#10b981" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SmartCrick" />
  <meta name="description" content="SmartCrick — AI-powered cricket training. 150 drills, structured challenges, mental training, fitness builder." />
  <title>SmartCrick — Train Like a Pro</title>

  <!-- Custom styles: XP flash, spinner, sidebar animations, premium badge -->
  <link rel="stylesheet" href="/styles.css" />

  <!--
    Tailwind Play CDN v4.
    The @variant dark rule enables CLASS-based dark mode:
    add .dark class to any ancestor element to activate dark: variants.
  -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    @import "tailwindcss";
    @variant dark (&:is(.dark, .dark *));
  </style>

  <!-- Canvas Confetti: provides window.confetti() for completion celebrations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body class="overscroll-none">
  <div id="root"></div>
  <!-- defer: waits for full DOM parse so getElementById(root) never returns null -->
  <script defer src="/app.js"></script>
</body>
</html>
